<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Screen Image Popup</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;  /* Prevents scrolling */
    }

    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.75);  /* Semi-transparent background */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;  /* Keeps the popup on top */
      overflow: hidden;
    }

    .popup img {
      width: 100%;  /* Make the image responsive */
      height: 100%;
      object-fit: cover;  /* Ensures the image covers the screen while maintaining its aspect ratio */
    }
  </style>
</head>
<body>

  <div class="popup" id="popup">
    <img src="https://i.imgur.com/T1kjLag.jpeg" alt="popup image">
  </div>

  <script>
    // Display the popup when the page is loaded
    window.onload = function() {
      document.getElementById("popup").style.display = "flex";
    }
  </script>
</body>
</html>
