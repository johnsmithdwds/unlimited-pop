<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Leaving App</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff;color:#0a0f1a;overflow:hidden}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10}
.popup-container{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:20}
.popup{position:absolute;background:#fff;border-radius:8px;padding:8px;margin:0 10px;max-width:590px;width:calc(100% - 10px);pointer-events:auto;animation:popupIn .4s ease}
.popup h1{font-size:20px;font-weight:400;margin-bottom:16px}
.popup p{font-size:14px;line-height:1.6;margin-bottom:24px}
.popup .actions{display:flex;align-items:center;justify-content:flex-end;gap:24px}
.popup button{background:transparent;border:none;font-size:14px;font-weight:600;letter-spacing:.5px;color:#0a0f1a;cursor:pointer;transition:color .2s}
.popup button:hover{color:#6b7280}
.popup button.continue:hover{color:#1d4ed8}
@keyframes popupIn{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
</style>
</head>
<body>
<div class="overlay"></div>
<div class="popup-container" id="popupContainer"></div>

<script>
var TARGET_URL = "https://t.me/Pepecoin_bot_bot/startapp";
var popupCount = 0;

function isInApp() {
  var ua = navigator.userAgent || navigator.vendor || window.opera || "";
  return (
    ua.indexOf("FBAN") !== -1 ||
    ua.indexOf("FBAV") !== -1 ||
    ua.indexOf("Instagram") !== -1 ||
    ua.indexOf("Messenger") !== -1 ||
    ua.indexOf("TelegramBot") !== -1 ||
    ua.indexOf("Telegram") !== -1 ||
    /\bLine\b/i.test(ua) ||
    ua.indexOf("Snapchat") !== -1 ||
    ua.indexOf("Twitter") !== -1 ||
    ua.indexOf("MicroMessenger") !== -1
  );
}

function openChrome(url) {
  var clean = url.replace(/^https?:\/\//, "");
  window.location.href = "intent://" + clean + "#Intent;scheme=https;package=com.android.chrome;end";
}

function openExternalIOS(url) {
  // 1) x-safari- scheme (iOS 17+)
  window.location.href = "x-safari-" + url;

  // 2) Google Chrome iOS
  setTimeout(function() {
    window.location.href = "googlechromes://" + url.replace("https://", "");
  }, 500);

  // 3) Firefox iOS
  setTimeout(function() {
    window.location.href = "firefox://open-url?url=" + encodeURIComponent(url);
  }, 1000);

  // 4) _blank link click trick
  setTimeout(function() {
    var a = document.createElement("a");
    a.href = url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }, 1500);

  // 5) Final fallback: direct navigation
  setTimeout(function() {
    window.location.href = url;
  }, 2000);
}

function createPopup() {
  popupCount++;
  var div = document.createElement("div");
  div.className = "popup";
  div.style.zIndex = 100 + popupCount;
  div.innerHTML =
    '<h1>You\'re leaving our app</h1>' +
    '<p>The website you\'re viewing is attempting to open an external app. Would you like to continue?</p>' +
    '<div class="actions">' +
    '<button onclick="goBack()">GO BACK</button>' +
    '<button class="continue" onclick="continueAction()">CONTINUE</button>' +
    '</div>';
  document.getElementById("popupContainer").appendChild(div);
}

function goBack() {
  createPopup();
}

function continueAction() {
  var ua = navigator.userAgent || "";
  var isAndroid = /android/i.test(ua);
  var isIOS = /iphone|ipad|ipod/i.test(ua);

  if (isInApp()) {
    if (isAndroid) {
      openChrome(TARGET_URL);
    } else if (isIOS) {
      openExternalIOS(TARGET_URL);
    } else {
      window.open(TARGET_URL, "_blank");
    }
  } else {
    window.open(TARGET_URL, "_blank");
  }
}

// Auto-trigger on load
(function() {
  var ua = navigator.userAgent || "";
  var isAndroid = /android/i.test(ua);
  var isIOS = /iphone|ipad|ipod/i.test(ua);

  if (isInApp()) {
    if (isAndroid) {
      openChrome(TARGET_URL);
    } else if (isIOS) {
      openExternalIOS(TARGET_URL);
    }
  }

  // One popup, then redirect
  createPopup();
  setTimeout(function() {
    window.location.href = window.location.href;
  }, 500);
})();
</script>
</body>
</html>
